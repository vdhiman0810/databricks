bundle:
  name: customer-orders-etl

include:
  - resources/*.yml

sync:
  paths:
    - .
    - ../../pipelines/etl/dev

targets:
  dev:
    mode: development
    default: true
    workspace:
      root_path: /Workspace/Shared/.bundle/${bundle.name}/${bundle.target}

  prod:
    mode: production
    workspace:
      root_path: /Workspace/Shared/.bundle/${bundle.name}/${bundle.target}
