name: Databricks Secret Scope CI/CD
run-name: Create Databricks-backed secret scope for ${{ github.actor }}

on:
  push:
    branches:
      - main
    paths:
      - secret-scope/dev/**
      - .github/workflows/databricks-secret-scope-cicd.yml
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  create-secret-scope:
    runs-on: ubuntu-latest
    environment: dev
    env:
      DATABRICKS_AUTH_TYPE: github-oidc
      DATABRICKS_HOST: ${{ vars.DATABRICKS_HOST }}
      DATABRICKS_CLIENT_ID: ${{ vars.DATABRICKS_CLIENT_ID }}
      SECRET_SCOPE_NAME: github-oidc-demo-scope-dev
      SECRET_KEY_NAME: sample-api-token
      SECRET_PRINCIPAL: ${{ vars.DATABRICKS_SECRET_SCOPE_PRINCIPAL }}
      SECRET_PERMISSION: READ
      SECRET_VALUE: ${{ secrets.DATABRICKS_SAMPLE_SECRET_VALUE }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Install Databricks CLI
        uses: databricks/setup-cli@main

      - name: Validate GitHub OIDC authentication
        run: databricks current-user me

      - name: Create Databricks-backed secret scope if missing
        shell: bash
        run: |
          set -euo pipefail

          SCOPE_EXISTS=$(databricks secrets list-scopes -o json | jq -r --arg scope "$SECRET_SCOPE_NAME" '
            if type == "array" then
              any(.[]; .name == $scope)
            else
              any(.scopes[]?; .name == $scope)
            end
          ')

          if [ "$SCOPE_EXISTS" = "true" ]; then
            echo "Secret scope $SECRET_SCOPE_NAME already exists."
          else
            databricks secrets create-scope "$SECRET_SCOPE_NAME"
            echo "Created secret scope $SECRET_SCOPE_NAME."
          fi

      - name: Add sample secret value
        shell: bash
        run: |
          set -euo pipefail

          if [ -z "${SECRET_VALUE:-}" ]; then
            echo "DATABRICKS_SAMPLE_SECRET_VALUE is not configured. Skipping secret creation."
            exit 0
          fi

          databricks secrets put-secret "$SECRET_SCOPE_NAME" "$SECRET_KEY_NAME" --string-value "$SECRET_VALUE"

      - name: Grant scope ACL
        if: ${{ vars.DATABRICKS_SECRET_SCOPE_PRINCIPAL != '' }}
        run: databricks secrets put-acl "$SECRET_SCOPE_NAME" "$SECRET_PRINCIPAL" "$SECRET_PERMISSION"

      - name: Verify scope and keys
        shell: bash
        run: |
          set -euo pipefail
          databricks secrets list-scopes
          databricks secrets list-secrets "$SECRET_SCOPE_NAME"
