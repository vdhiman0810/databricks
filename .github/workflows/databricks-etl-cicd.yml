name: Databricks ETL CI/CD
run-name: Deploy and run ETL pipeline for ${{ github.actor }}

on:
  push:
    branches:
      - main
    paths:
      - pipelines/etl/dev/**
      - data/etl/dev/**
      - .github/workflows/databricks-etl-cicd.yml
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  deploy-and-run-etl:
    runs-on: ubuntu-latest
    environment: dev
    env:
      DATABRICKS_AUTH_TYPE: github-oidc
      DATABRICKS_HOST: ${{ vars.DATABRICKS_HOST }}
      DATABRICKS_CLIENT_ID: ${{ vars.DATABRICKS_CLIENT_ID }}
      LOCAL_NOTEBOOK_PATH: pipelines/etl/dev/01_customer_orders_etl.py
      LOCAL_DATA_PATH: data/etl/dev/customer_orders_raw.csv
      REMOTE_NOTEBOOK_DIR: /Shared/pipelines/etl/dev
      REMOTE_NOTEBOOK_PATH: /Shared/pipelines/etl/dev/01_customer_orders_etl
      REMOTE_RAW_PATH: dbfs:/Volumes/test_databricks/tennis/tennis_volume/etl/raw/customer_orders_raw.csv
      REMOTE_OUTPUT_ROOT: dbfs:/Volumes/test_databricks/tennis/tennis_volume/etl/output
      JOB_NAME: github-oidc-etl-dev

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Install Databricks CLI
        uses: databricks/setup-cli@main

      - name: Validate GitHub OIDC authentication
        run: databricks current-user me

      - name: Upload raw ETL input file
        run: databricks fs cp "$LOCAL_DATA_PATH" "$REMOTE_RAW_PATH" --overwrite

      - name: Import ETL notebook
        run: |
          databricks workspace mkdirs "$REMOTE_NOTEBOOK_DIR"
          databricks workspace import "$REMOTE_NOTEBOOK_PATH" --file "$LOCAL_NOTEBOOK_PATH" --format SOURCE --language PYTHON --overwrite

      - name: Create or update ETL job
        shell: bash
        run: |
          set -euo pipefail

          cat > job-settings.json <<EOF
          {
            "name": "${JOB_NAME}",
            "tasks": [
              {
                "task_key": "customer_orders_etl",
                "notebook_task": {
                  "notebook_path": "${REMOTE_NOTEBOOK_PATH}",
                  "source": "WORKSPACE",
                  "base_parameters": {
                    "input_path": "${REMOTE_RAW_PATH}",
                    "output_root": "${REMOTE_OUTPUT_ROOT}",
                    "pipeline_name": "customer_orders_etl_demo"
                  }
                },
                "timeout_seconds": 300,
                "max_retries": 1
              }
            ],
            "max_concurrent_runs": 1
          }
          EOF

          EXISTING_JOB_ID=$(databricks jobs list -o json | jq -r --arg job_name "${JOB_NAME}" '
            if type == "array" then
              .[]
            else
              .jobs[]
            end
            | select((.settings.name // .name) == $job_name)
            | .job_id
          ' | head -n 1)

          if [ -n "${EXISTING_JOB_ID}" ] && [ "${EXISTING_JOB_ID}" != "null" ]; then
            jq --arg job_id "${EXISTING_JOB_ID}" '{job_id: ($job_id | tonumber), new_settings: .}' job-settings.json > job-reset.json
            databricks jobs reset --json @job-reset.json
            echo "JOB_ID=${EXISTING_JOB_ID}" >> "$GITHUB_ENV"
          else
            databricks jobs create --json @job-settings.json -o json > job-create-result.json
            CREATED_JOB_ID=$(jq -r '.job_id' job-create-result.json)
            echo "JOB_ID=${CREATED_JOB_ID}" >> "$GITHUB_ENV"
          fi

      - name: Trigger ETL job
        run: databricks jobs run-now "$JOB_ID"
