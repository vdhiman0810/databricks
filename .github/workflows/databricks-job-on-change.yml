name: Databricks Notebook Auto Deploy
run-name: Deploy changed notebooks to Databricks

on:
  push:
    branches:
      - main
    paths:
      - notebooks/dev/**
      - .github/workflows/databricks-job-on-change.yml
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  deploy-changed-notebooks:
    runs-on: ubuntu-latest
    environment: dev
    env:
      DATABRICKS_AUTH_TYPE: github-oidc
      DATABRICKS_HOST: ${{ vars.DATABRICKS_HOST }}
      DATABRICKS_CLIENT_ID: ${{ vars.DATABRICKS_CLIENT_ID }}
      LOCAL_NOTEBOOK_ROOT: notebooks/dev
      REMOTE_NOTEBOOK_ROOT: /Shared/notebooks/dev
      JOB_PREFIX: github-oidc-notebook-dev

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 2

      - name: Install Databricks CLI
        uses: databricks/setup-cli@main

      - name: Validate GitHub OIDC authentication
        run: databricks current-user me

      - name: Find changed notebooks
        id: changed_notebooks
        shell: bash
        run: |
          set -euo pipefail

          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            find "$LOCAL_NOTEBOOK_ROOT" -type f -name "*.py" | sort > changed_notebooks.txt
          else
            git diff --name-only "${{ github.event.before }}" "${{ github.sha }}" -- "$LOCAL_NOTEBOOK_ROOT" | grep -E '\.py$' | sort > changed_notebooks.txt || true
          fi

          if [ ! -s changed_notebooks.txt ]; then
            echo "No changed notebooks found."
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "Changed notebooks:"
          cat changed_notebooks.txt
          echo "has_changes=true" >> "$GITHUB_OUTPUT"

      - name: Create remote root folder
        if: steps.changed_notebooks.outputs.has_changes == 'true'
        run: databricks workspace mkdirs "$REMOTE_NOTEBOOK_ROOT"

      - name: Import notebooks and create jobs
        if: steps.changed_notebooks.outputs.has_changes == 'true'
        shell: bash
        run: |
          set -euo pipefail

          while IFS= read -r local_path; do
            notebook_name=$(basename "$local_path" .py)
            relative_dir=$(dirname "${local_path#$LOCAL_NOTEBOOK_ROOT/}")

            if [ "$relative_dir" = "." ]; then
              remote_dir="$REMOTE_NOTEBOOK_ROOT"
            else
              remote_dir="$REMOTE_NOTEBOOK_ROOT/$relative_dir"
            fi

            remote_path="$remote_dir/$notebook_name"
            job_name="$JOB_PREFIX-$notebook_name"
            task_key=$(echo "$notebook_name" | tr -c '[:alnum:]' '_' | sed 's/^_*//;s/_*$//')

            echo "Importing $local_path to $remote_path"
            databricks workspace mkdirs "$remote_dir"
            databricks workspace import "$remote_path" --file "$local_path" --format SOURCE --language PYTHON --overwrite

            cat > job-settings.json <<EOF
            {
              "name": "${job_name}",
              "tasks": [
                {
                  "task_key": "${task_key}",
                  "notebook_task": {
                    "notebook_path": "${remote_path}",
                    "source": "WORKSPACE"
                  }
                }
              ],
              "max_concurrent_runs": 1
            }
            EOF

            existing_job_id=$(databricks jobs list -o json | jq -r --arg job_name "${job_name}" '
              if type == "array" then
                .[]
              else
                .jobs[]
              end
              | select((.settings.name // .name) == $job_name)
              | .job_id
            ' | head -n 1)

            if [ -n "${existing_job_id}" ] && [ "${existing_job_id}" != "null" ]; then
              jq --arg job_id "${existing_job_id}" '{job_id: ($job_id | tonumber), new_settings: .}' job-settings.json > job-reset.json
              databricks jobs reset --json @job-reset.json
              job_id="${existing_job_id}"
            else
              databricks jobs create --json @job-settings.json -o json > job-create-result.json
              job_id=$(jq -r '.job_id' job-create-result.json)
            fi

            echo "Triggering job $job_name ($job_id)"
            databricks jobs run-now "$job_id"
          done < changed_notebooks.txt
