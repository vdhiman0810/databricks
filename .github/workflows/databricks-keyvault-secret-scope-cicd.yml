name: Databricks Azure Key Vault Secret Scope CI/CD
run-name: Create Azure Key Vault-backed secret scope for ${{ github.actor }}

on:
  push:
    branches:
      - main
    paths:
      - secret-scope-keyvault/dev/**
      - .github/workflows/databricks-keyvault-secret-scope-cicd.yml
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  create-keyvault-secret-scope:
    runs-on: ubuntu-latest
    environment: dev
    env:
      DATABRICKS_AUTH_TYPE: github-oidc
      DATABRICKS_HOST: ${{ vars.DATABRICKS_HOST }}
      DATABRICKS_CLIENT_ID: ${{ vars.DATABRICKS_CLIENT_ID }}
      SECRET_SCOPE_NAME: ${{ vars.DATABRICKS_KEYVAULT_SCOPE_NAME }}
      KEYVAULT_RESOURCE_ID: ${{ vars.AZURE_KEYVAULT_RESOURCE_ID }}
      KEYVAULT_DNS_NAME: ${{ vars.AZURE_KEYVAULT_DNS_NAME }}
      SECRET_PRINCIPAL: ${{ vars.DATABRICKS_SECRET_SCOPE_PRINCIPAL }}
      SECRET_PERMISSION: READ

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Install Databricks CLI
        uses: databricks/setup-cli@main

      - name: Validate GitHub OIDC authentication
        run: databricks current-user me

      - name: Validate required configuration
        shell: bash
        run: |
          set -euo pipefail

          if [ -z "${SECRET_SCOPE_NAME:-}" ]; then
            echo "DATABRICKS_KEYVAULT_SCOPE_NAME is not set in the selected GitHub Environment."
            exit 1
          fi

          if [ -z "${KEYVAULT_RESOURCE_ID:-}" ]; then
            echo "AZURE_KEYVAULT_RESOURCE_ID is not set in the selected GitHub Environment."
            exit 1
          fi

          if [ -z "${KEYVAULT_DNS_NAME:-}" ]; then
            echo "AZURE_KEYVAULT_DNS_NAME is not set in the selected GitHub Environment."
            exit 1
          fi

      - name: Create Azure Key Vault-backed secret scope if missing
        shell: bash
        run: |
          set -euo pipefail

          SCOPE_EXISTS=$(databricks secrets list-scopes -o json | jq -r --arg scope "$SECRET_SCOPE_NAME" '
            if type == "array" then
              any(.[]; .name == $scope)
            else
              any(.scopes[]?; .name == $scope)
            end
          ')

          if [ "$SCOPE_EXISTS" = "true" ]; then
            echo "Secret scope $SECRET_SCOPE_NAME already exists."
          else
            cat > keyvault-scope.json <<EOF
            {
              "scope": "${SECRET_SCOPE_NAME}",
              "scope_backend_type": "AZURE_KEYVAULT",
              "backend_azure_keyvault": {
                "resource_id": "${KEYVAULT_RESOURCE_ID}",
                "dns_name": "${KEYVAULT_DNS_NAME}"
              }
            }
            EOF

            databricks secrets create-scope "$SECRET_SCOPE_NAME" --scope-backend-type AZURE_KEYVAULT --json @keyvault-scope.json
            echo "Created Azure Key Vault-backed secret scope $SECRET_SCOPE_NAME."
          fi

      - name: Grant scope ACL
        if: ${{ vars.DATABRICKS_SECRET_SCOPE_PRINCIPAL != '' }}
        run: databricks secrets put-acl "$SECRET_SCOPE_NAME" "$SECRET_PRINCIPAL" "$SECRET_PERMISSION"

      - name: Verify scope
        shell: bash
        run: |
          set -euo pipefail
          databricks secrets list-scopes
          echo "Azure Key Vault-backed secret scopes are read-only from Databricks."
          echo "Add or update actual secret values in Azure Key Vault, not with databricks secrets put-secret."
